<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            background-color: #e8eced;
        }
        section {
            text-align: center;
            font-family: Arial, sans-serif, Helvetica;
            background-image: url("images/christus.webp");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border: 10px solid #001f27;
            border-radius: 10px;
            padding: 50px;
            max-width: 1500px;
            width: 90%;
            margin: 30px auto;
            box-sizing: border-box;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            height: auto;
            
        }
        h1 {
            color: #fffffe;
            font-size: 64px;
            margin-bottom: 10px;
            font-family: Arial, sans-serif, Helvetica;
            font-weight: 400;
        }
        h2 {
            color: #fffffe;
            font-size: 42px;
            margin-bottom: 10px;
            font-family: Arial, sans-serif, Helvetica;
            font-weight: 400;
        }
        img {
            width: 150px;
            height: 150px;
            border: 7px solid #ffffff;
            margin: 20px 0;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
        }
        .Counselor {
            width: 200px;
            height: 200px;
            
        }
        #oaks {
            width: 250px;
            height: 250px;
        }
        .quorum_of_the_twelve {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            justify-items: center; 
            align-items: center;   
            gap: 12px;            
        }
        .first {
            grid-column: 2/3;
        }
        .second {
            grid-column: 3/4;
        }
        .third {
            grid-column: 4/5;
        }
        .fourth {
            grid-column: 5/6;
        }
        img:hover{ 
            transform:scale(1.03) 
        }
    </style>
</head>
<body>
    <Section>
        <div class = first_presidency>
            <h1>First Presidency</h1>
            <img src="images/eyring.webp" alt ="Eyring" class="Counselor">
            <img src="images/oaks.webp" alt ="Oaks" id="oaks">
            <img src="images/christofferson.webp" alt ="Christofferson" class="Counselor">
        </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div class = quorum_of_the_twelve>
            <img src="images/holland.webp" alt ="holland" class="first">
            <img src="images/uchtdorf.webp" alt ="uchtdorf" class="second">
            <img src="images/bednar.webp" alt ="bednar" class="third">
            <img src="images/cook.webp" alt ="cook" class="fourth">
            <img src="images/anderson.webp" alt ="anderson" class="first">
            <img src="images/rasband.webp" alt ="rasband" class="second">
            <img src="images/stevenson.webp" alt ="stevenson" class="third">
            <img src="images/renlund.webp" alt ="renlund" class="fourth">
            <img src="images/gong.webp" alt ="gong" class="first">
            <img src="images/soares.webp" alt ="soares" class="second">
            <img src="images/kearon.webp" alt ="kearon" class="third">
            <img src="images/causse.webp" alt ="causse" class="fourth">
        </div>
    </Section>
</body>
</html>
