<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }
        #formContainer {
            background: white;
            width: 500px;
            margin: 50px auto;
            border-radius: 10px;
            position: relative;
            border: solid 5px blue;
        }
        #formContainer h3 {
            text-align: center;
            margin-bottom: 20px;
        }
        #formContainer label {
            display: block;
            margin-top: 10px;
            margin-left: 10px;
        }
        #formContainer input[type="text"],
        #formContainer input[type="password"],
        #formContainer input[type="email"] {
            width: 75%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right:10px;
        }
        #jesusflix {
            display: block;
            margin: 0 auto 20px auto;
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
            object-position: center top;
        }
        h1, h2 {
            text-align: center;
            display: block;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
            position: absolute;
        }
        h1 {
            top: 40%;
            font-size: 2.5em;
        }
        h2 {
            top: 60%;
            font-size: 1.5em;
        }
        #imageWrapper {
            position: relative;
            border-radius: 5px;
        }
        #closeBtn {
            position: absolute;
            top: 5px;
            left: 15px;
            font-size: 10px;
            cursor: pointer;
        }
        .formRow {
            display: flex;
            align-items: center;
            margin-top: 10px;
        }
        .formRow label {
            width: 120px;
        }
        .formRow input {
            flex: 1;
        }
        #buttonQs {
            display: flex;
            justify-content: center;
            gap: 15px;   
            margin-top: 25px;
        }
        #images {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
        #images img {
            width: 100px;
            height: auto;
            object-fit: cover;
            border-radius: 5px;
        }

    </style>




</head>

<body>
    <div id="formContainer">
        <div id="imageWrapper">
        <img id="jesusflix" src="images/jesus_feeds_5000.jpeg" href="images/jesus_feeds_5000.jpeg" alt="Jesus feeds 5000">
        <h1>Daily Feed</h1>
        <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <div class="formRow">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>
            </div>
            <div class="formRow">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            </div>
            <div class="formRow">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            </div>
            <label>Gender:</label>
            <div id="buttonQs">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>

            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section>
                <button type="submit">Submit</button>
            </section>
        </form>
        <div id="images">
        <img src="images/old_testament.webp" htref="images/old_testament.webp" alt="Old Testament" >
        <img src="images/new_testament.webp" href="images/new_testament.webp" alt="New Testament" >
        <img src="images/book_of_mormon.webp" href="images/book_of_mormon.webp" alt="Book of Mormon" >
        <img src="images/doctrine_and_covenants.webp" href="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants" >
        <img src="images/pearl_of_great_price.webp" href="images/pearl_of_great_price.webp" alt="Pearl of Great Price" >
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
